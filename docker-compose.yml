services:
  demo:
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    build:
      context: .
      args:
        - VITE_TENDERLY_API_URL=${VITE_TENDERLY_API_URL}
        - VITE_TENDERLY_API_KEY=${VITE_TENDERLY_API_KEY}
    restart: unless-stopped
    networks:
      - indexer_app-network
    expose:
      - "80"

networks:
  # Connect to the indexer's existing network
  indexer_app-network:
    external: true
